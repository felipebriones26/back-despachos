name: CI/CD Pipeline - Back Despachos

on:
  push:
    branches: [ "deploy" ] 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Autenticación en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }} 
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construcción y Publicación de la Imagen
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Despliegue en AWS EC2 vía SSH (Usando Bastión)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 10.0.6.122
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        proxy_host: ${{ secrets.FRONTEND_HOST }}
        proxy_username: ec2-user
        proxy_key: ${{ secrets.FRONTEND_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest
          docker stop api-despachos || true
          docker rm api-despachos || true
          docker run -d --name api-despachos -p 8081:8080 ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest